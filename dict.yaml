---
- name: accessing values in dictionary
  hosts: local
  gather_facts: false

  vars:
    # This is a dictionary.
    # Dictionary stores data as key-value pairs.
    dict1:
      phone: iphone
      model: 12

  tasks:
    - name: access dictionary values directly
      debug:
        # Direct access:
        # dict1.phone gives iphone
        # dict1.model gives 12
        msg: "jansi phone is {{ dict1.phone }} and model is {{ dict1.model }}"

    - name: convert dictionary to list format
      debug:
        # dict2items converts dictionary into list of key/value items.
        # dict1 becomes:
        # - key: phone
        #   value: iphone
        # - key: model
        #   value: 12
        # [{"key":"phone","value":"iphone"},{"key": "model","value": "12"}]
        msg: "entire dict after dict2items is {{ dict1 | dict2items }}"

    - name: access dictionary using loop
      debug:
        # After dict2items, each loop item has:
        # item.key
        # item.value
        msg: "{{ item.key }} is {{ item.value }}"
      loop: "{{ dict1 | dict2items }}"