- name: configure mysql server
  hosts: mysql
  become: yes
  tasks:
    - name: install mysql server
      package:
       name: mysql-server
       state: present
    - name: service start mysql server
      service:
        state: started   
        enabled: yes
        name: mysqld
    - name: set password for mysql server
      command: mysql_secure_installation --set-root-pass RoboShop@1    