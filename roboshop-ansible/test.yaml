- name: create ec2 
  hosts: local
  connection: local
  vars:
    ami_id: ami-09c813fb71547fc4f
    sg_id: sg-0708e7bc7b4f99963 # replace with your SG ID
    zone_id: "Z09439482Q9O4TJ24NLTV" # replace with your ID
    domain_name: "jansi.fun"
    # we can pass instances through command line using -e
    instances: 
     - mongodb
     - redis
    # - mysql
    # - rabbitmq
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      instance_type: t3.micro
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: print the ec2_output
    debug:
      msg: "{{ ec2_output }}"

  