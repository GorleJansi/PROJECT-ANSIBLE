- name: create ec2 
  hosts: local
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-0dcb718cd7cee32dd # replace with your SG ID
    zone_id: "Z09439482Q9O4TJ24NLTV" # replace with your ID
    domain_name: "jansi.fun"
    #  we can pass instances through command line using -e
    instances: 
      - mongodb
      - redis
      - mysql
      - rabbitmq
  tasks:
      - name: create ec2 instance
        amazon.aws.ec2_instance:
          name: "{{ item }}"
          instance_type: t3.micro
          security_group: "{{ sg_id }}"
          image_id: "{{ ami_id }}"
          tags:
            Name: "{{ item }}"
        loop: "{{ instances }}"
        register: ec2_output

      - name: ouput of create ec2
        debug:
          msg: "{{ ec2_output }}"   
 
      - name: create r53 record for created instances
        amazon.aws.route53:
              state: present
              zone: "{{ domain_name }}"
              record: "{{ item.item }}.{{ domain_name }}"
              type: A
              ttl: 1
              value: "{{ item.instances[0].private_ip_address }}" 
              overwrite: true
        loop: "{{ec2_output.results}}"  
      - name: create r53 record for frontend
        amazon.aws.route53:
              state: present
              zone: "{{ domain_name }}"
              record: "{{ item.item }}.{{ domain_name }}"
              type: A
              ttl: 1
              value: "{{ item.instances[0].public_ip_address }}" 
              overwrite: true
        when: item.item == "frontend"      
        loop: "{{ec2_output.results}}"              