- name: iconfigure redis app on redis server
  hosts: redis
  become: yes
  tasks:
    - name: disable default redis
      command: dnf module disable redis -y
    - name: enable given redis version
      command: dnf module enable redis:7 -y
    - name: install redis
      package:
         name: redis
         state: present
    - name: allow remote connections          
      replace:
        path: /etc/redis/redis.conf
        regexp: '127.0.0.0'
        replace: '0.0.0.0'
    - name: disbale protected mode
      lineinfile:
        path: /etc/redis/redis.conf
        regexp: 'protected-mode' 
        line:  'protected-mode no'
    - name: service start
      service:
        state: started
        enabled: yes
        name: redis     