- name: configurtion of mongodb app on mongodb server
  hosts: mongodb
  become: yes
  tasks:
    - name: copy repo file to /etc/yum.repo.d/mongodb.repo
      copy:
        src: mongodb.repo
        dest: /etc/yum.repos.d/mongodb.repo
    - name: downaload mongodb
      package:
        state: present
        name: mongodb-org
    - name: allow remote connections
      lineinfile:
         path: /etc/mongod.conf
         regexp: '^  bindIp:'
         line: '  bindIp: 0.0.0.0'

    - name: service restart
      service:
         state: restarted
         name: mongod        
         enabled: yes

    - name: wait for mongodb port
      wait_for:
         port: 27017
         timeout: 30
