- name: apply filters on numbers
  hosts: local
  vars:
    list1:
     - -5
     - 6
     - 3
     - 10
  tasks:
   - name: absolute of number
     debug:
      msg: "absolute of {{ list1[0] }} is {{ list1[0] | abs }}" 

   - name: max  number in list
     debug:
      msg: "max of {{ list1 }} is {{ list1 | max }}"    

   - name: min  number in list
     debug:
      msg: "min of {{ list1 }} is {{ list1 | min }}"  

   - name: sum of numbers in list
     debug:
      msg: "sum of {{ list1 }} is {{ list1 | sum }}"          